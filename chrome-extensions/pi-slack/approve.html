<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pi Slack Approval</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        color: #1f2937;
        background: #f8fafc;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 12px;
      }
      .muted {
        color: #6b7280;
        font-size: 13px;
        margin-bottom: 12px;
      }
      .approval {
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 12px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      .approval h2 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      .approval ul {
        margin: 0 0 12px 18px;
        padding: 0;
        font-size: 13px;
        line-height: 1.5;
      }
      .meta {
        font-size: 12px;
        color: #6b7280;
        margin-bottom: 10px;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      button {
        padding: 8px 10px;
        cursor: pointer;
      }
      .empty {
        background: white;
        border: 1px dashed #cbd5e1;
        border-radius: 8px;
        padding: 16px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <h1>Pi Slack approvals</h1>
    <div class="muted">Each Slack read must be approved here before Chrome will process it.</div>
    <div id="approvals" class="empty">Loading…</div>
    <script type="module" src="approve.js"></script>
  </body>
</html>
